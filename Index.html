<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Math Master Ultra Pro - Final Fix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', sans-serif;
        }
        body {
            background: #eef2f7;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-card {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 36px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        .header {
            background: #1e3a5f;
            padding: 18px 22px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.4rem; font-weight: 700; }
        .streak-badge {
            background: #ffb347;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1e3a5f;
        }
        .settings-icon {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 30px;
        }
        .content {
            padding: 20px 22px 28px;
            min-height: 480px;
        }
        .back-btn {
            background: #eef2f7;
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #1e3a5f;
        }
        .grid-2col { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .grid-3col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .cat-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e293b;
            cursor: pointer;
        }
        .cat-card:active { background: #e2e8f0; transform: scale(0.97); }
        .section-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: #1e3a5f;
            margin: 16px 0 10px 0;
        }
        .level-btn {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 10px 8px;
            font-size: 0.7rem;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
        }
        .level-btn:active { background: #e2e8f0; transform: scale(0.97); }
        .history-box {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 14px;
            margin-top: 20px;
            font-size: 0.7rem;
            max-height: 150px;
            overflow-y: auto;
            color: #2c3e50;
        }
        .quiz-panel {
            background: #f8fafc;
            border-radius: 32px;
            padding: 20px;
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 12px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e3a5f;
            flex-wrap: wrap;
            gap: 8px;
        }
        .question {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            background: white;
            padding: 28px 12px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-family: monospace;
            word-break: break-word;
        }
        .answer-input {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            text-align: center;
            border: 2px solid #cbd5e1;
            border-radius: 60px;
            background: white;
            font-weight: 500;
        }
        .answer-input.wrong {
            border-color: #e53e3e;
            background: #fff5f5;
        }
        .quiz-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .quiz-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }
        .pause-btn { background: #cbd5e1; color: #1e293b; }
        .end-btn { background: #e67e22; color: white; }
        .menu-btn { background: #eef2f7; color: #1e3a5f; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            border-radius: 40px;
            padding: 24px;
            width: 85%;
            max-width: 340px;
        }
        .modal-card select, .modal-card input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
        }
        button { cursor: pointer; }
        hr { margin: 12px 0; }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // ---------- LEVELS (all unlocked) ----------
    const DIGIT_COMBOS = ["1x1","2x1","3x1","2x2","3x2","3x3","4x4","5x5","6x6","7x7"];
    const MULTI_DIGITS = [1,2,3,4,5];
    const MULTI_TERMS = [3,4,5,6,7];
    
    let ALL_LEVELS = [
        ...DIGIT_COMBOS.map(d => `digit_${d}`),
        ...MULTI_DIGITS.flatMap(d => MULTI_TERMS.map(t => `multiset_${d}digit_${t}term`)),
        ...MULTI_DIGITS.map(d => `multiset_${d}digit_mix`)
    ];
    
    let statsData = {
        Addition: initStats(), Subtraction: initStats(),
        Multiplication: initStats(), Division: initStats()
    };
    function initStats() {
        let obj = {};
        ALL_LEVELS.forEach(lvl => obj[lvl] = { correct: 0, total: 0 });
        return obj;
    }
    function updateStats(cat, key, correct) {
        if (statsData[cat]?.[key]) {
            statsData[cat][key].total++;
            if (correct) statsData[cat][key].correct++;
            saveData();
        }
    }
    function getStatsText(cat, key) {
        let s = statsData[cat]?.[key];
        if (!s || s.total === 0) return "";
        let wrong = s.total - s.correct;
        return ` (${s.correct}✅, ${wrong}❌)`;
    }
    
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function gcd(a,b) { return b === 0 ? a : gcd(b, a%b); }
    
    // ---------- QUESTION GENERATORS (subtraction negative fix: accept positive if answer negative) ----------
    function generateDigitCombo(cat, levelKey) {
        let combo = levelKey.replace("digit_","");
        let [da, db] = combo.split("x").map(Number);
        let minA = da===1?0:Math.pow(10,da-1), maxA = Math.pow(10,da)-1;
        let minB = db===1?0:Math.pow(10,db-1), maxB = Math.pow(10,db)-1;
        let a = rand(minA, maxA);
        let b = rand(minB, maxB);
        if (cat === "Subtraction") {
            // Allow negative result, no swapping
            let ans = a - b;
            return { text: `${a} - ${b}`, ans: ans, isSubtraction: true };
        }
        if (cat === "Division") {
            if (b === 0) b = 1;
            let q = rand(1,200);
            a = b * q;
            while (a > maxA && da<7) { q = rand(1,100); a = b*q; }
            if (a > maxA) a = b * rand(1, Math.floor(maxA/b));
            return { text: `${a} ÷ ${b}`, ans: a / b };
        }
        if (cat === "Addition") return { text: `${a} + ${b}`, ans: a + b };
        if (cat === "Multiplication") return { text: `${a} × ${b}`, ans: a * b };
        return { text: "1+1", ans: 2 };
    }
    
    function generateMultiSetFixed(cat, levelKey) {
        let parts = levelKey.split("_");
        let digit = parseInt(parts[1].replace("digit",""));
        let terms = parseInt(parts[2].replace("term",""));
        let minVal = digit===1?0:Math.pow(10,digit-1);
        let maxVal = Math.pow(10,digit)-1;
        let nums = [];
        for (let i=0; i<terms; i++) nums.push(rand(minVal, maxVal));
        if (cat === "Addition") return { text: nums.join(" + "), ans: nums.reduce((s,v)=>s+v,0) };
        if (cat === "Subtraction") {
            let result = nums[0];
            for (let i=1; i<nums.length; i++) result -= nums[i];
            return { text: nums.join(" - "), ans: result, isSubtraction: true };
        }
        if (cat === "Multiplication") return { text: nums.join(" × "), ans: nums.reduce((p,v)=>p*v,1) };
        if (cat === "Division") {
            let val = nums[0];
            for (let i=1; i<nums.length; i++) if (nums[i] !== 0) val /= nums[i];
            return { text: nums.join(" ÷ "), ans: Math.floor(val) };
        }
        return { text: "1+1", ans: 2 };
    }
    
    function generateMultiSetMix(cat, levelKey) {
        let digit = parseInt(levelKey.split("_")[1].replace("digit",""));
        let terms = rand(3,7);
        let minVal = digit===1?0:Math.pow(10,digit-1);
        let maxVal = Math.pow(10,digit)-1;
        let nums = [];
        for (let i=0; i<terms; i++) nums.push(rand(minVal, maxVal));
        if (cat === "Addition") return { text: nums.join(" + "), ans: nums.reduce((s,v)=>s+v,0) };
        if (cat === "Subtraction") {
            let result = nums[0];
            for (let i=1; i<nums.length; i++) result -= nums[i];
            return { text: nums.join(" - "), ans: result, isSubtraction: true };
        }
        if (cat === "Multiplication") return { text: nums.join(" × "), ans: nums.reduce((p,v)=>p*v,1) };
        if (cat === "Division") {
            let val = nums[0];
            for (let i=1; i<nums.length; i++) if (nums[i] !== 0) val /= nums[i];
            return { text: nums.join(" ÷ "), ans: Math.floor(val) };
        }
        return { text: "1+1", ans: 2 };
    }
    
    function generateMixedQuestion(levelKey, allowedOps) {
        let isDigit = levelKey.startsWith("digit_");
        let numTerms, digits;
        if (isDigit) {
            let combo = levelKey.replace("digit_","");
            let [da, db] = combo.split("x").map(Number);
            digits = Math.max(da, db);
            numTerms = 2;
        } else {
            let parts = levelKey.split("_");
            digits = parseInt(parts[1].replace("digit",""));
            if (levelKey.includes("mix")) numTerms = rand(3,7);
            else numTerms = parseInt(parts[2].replace("term",""));
        }
        let minVal = digits===1?0:Math.pow(10,digits-1);
        let maxVal = Math.pow(10,digits)-1;
        let numbers = [];
        for (let i=0; i<numTerms; i++) numbers.push(rand(minVal, maxVal));
        let ops = [];
        for (let i=0; i<numTerms-1; i++) {
            let op = allowedOps[Math.floor(Math.random() * allowedOps.length)];
            ops.push(op);
        }
        let expr = `${numbers[0]}`;
        let result = numbers[0];
        for (let i=0; i<ops.length; i++) {
            let nextNum = numbers[i+1];
            expr += ` ${ops[i]} ${nextNum}`;
            if (ops[i] === '+') result += nextNum;
            else if (ops[i] === '-') result -= nextNum;
            else if (ops[i] === '×') result *= nextNum;
            else if (ops[i] === '÷') result = Math.floor(result / nextNum);
        }
        return { text: expr, ans: result };
    }
    
    // Pro modules (AI, Stress, Decimal)
    let aiDifficulty = 2;
    let stressLevel = 1;
    function generateProQuestion(moduleName) {
        if (moduleName === "AI Smart Trainer") {
            let diff = Math.min(4, Math.max(0, aiDifficulty));
            if (diff <= 1) {
                let a = rand(1,20), b = rand(1,20);
                let op = rand(0,1) ? '+' : '-';
                if (op === '+') return { text: `${a} + ${b}`, ans: a+b };
                else return { text: `${a} - ${b}`, ans: a-b, isSubtraction: true };
            } else if (diff <= 2) {
                let a = rand(10,99), b = rand(10,99);
                let op = ['+','-','×'][rand(0,2)];
                if (op === '+') return { text: `${a} + ${b}`, ans: a+b };
                if (op === '-') return { text: `${a} - ${b}`, ans: a-b, isSubtraction: true };
                return { text: `${a} × ${b}`, ans: a*b };
            } else if (diff <= 3) {
                let a = rand(100,999), b = rand(10,99);
                let op = ['+','-','×'][rand(0,2)];
                if (op === '+') return { text: `${a} + ${b}`, ans: a+b };
                if (op === '-') return { text: `${a} - ${b}`, ans: a-b, isSubtraction: true };
                return { text: `${a} × ${b}`, ans: a*b };
            } else {
                let a = rand(1000,9999), b = rand(100,999);
                let op = ['+','-','×'][rand(0,2)];
                if (op === '+') return { text: `${a} + ${b}`, ans: a+b };
                if (op === '-') return { text: `${a} - ${b}`, ans: a-b, isSubtraction: true };
                return { text: `${a} × ${b}`, ans: a*b };
            }
        }
        if (moduleName === "Stress Buster") {
            let a = rand(10,99), b = rand(10,99);
            let op = ['+','-','×'][rand(0,2)];
            if (op === '+') return { text: `${a} + ${b}`, ans: a+b };
            if (op === '-') return { text: `${a} - ${b}`, ans: a-b, isSubtraction: true };
            return { text: `${a} × ${b}`, ans: a*b };
        }
        if (moduleName === "Decimal & Fraction") {
            let type = rand(1,4);
            if (type === 1) {
                let a = rand(1,100)/10, b = rand(1,100)/10;
                return { text: `${a} + ${b}`, ans: a+b };
            } else if (type === 2) {
                let a = rand(1,100)/10, b = rand(1,100)/10;
                return { text: `${a} - ${b}`, ans: a-b, isSubtraction: true };
            } else if (type === 3) {
                let a = rand(1,100)/10, b = rand(1,100)/10;
                return { text: `${a} × ${b}`, ans: a*b };
            } else {
                let n1=rand(1,10), d1=rand(2,10), n2=rand(1,10), d2=rand(2,10);
                let lcm = (d1*d2)/gcd(d1,d2);
                let ansNum = n1*(lcm/d1) + n2*(lcm/d2);
                return { text: `${n1}/${d1} + ${n2}/${d2}`, ans: ansNum/lcm };
            }
        }
        return { text: "1+1", ans: 2 };
    }
    
    function generateOther(cat, sub) {
        if (cat === "Square") {
            let d = sub==="1-digit"?1: sub==="2-digit"?2: sub==="3-digit"?3: sub==="4-digit"?4: rand(1,4);
            let n = rand(d===1?1:Math.pow(10,d-1), Math.pow(10,d)-1);
            return { text: `${n}²`, ans: n*n };
        }
        if (cat === "Cube") {
            let d = sub==="1-digit"?1: sub==="2-digit"?2: sub==="3-digit"?3:4;
            let n = rand(d===1?1:Math.pow(10,d-1), Math.pow(10,d)-1);
            return { text: `${n}³`, ans: n*n*n };
        }
        if (cat === "Square Root") {
            let base = sub==="Beginner"?rand(1,15): sub==="Intermediate"?rand(10,40): rand(20,100);
            return { text: `√${base*base}`, ans: base };
        }
        if (cat === "Cube Root") {
            let base = sub==="Beginner"?rand(1,12): sub==="Intermediate"?rand(5,25): rand(10,50);
            return { text: `∛${base*base*base}`, ans: base };
        }
        if (cat === "Tables") {
            let t = rand(1,100), m = rand(1,10);
            return { text: `${t} × ${m}`, ans: t*m };
        }
        if (cat === "Others") {
            if (sub === "Percentage") {
                let v = rand(200,5000), p = rand(5,95);
                return { text: `${p}% of ${v}`, ans: (p/100)*v };
            }
            if (sub === "LCM") {
                let a=rand(6,50), b=rand(6,50);
                return { text: `LCM(${a},${b})`, ans: (a*b)/gcd(a,b) };
            }
            if (sub === "HCF") {
                let a=rand(12,100), b=rand(12,100);
                return { text: `HCF(${a},${b})`, ans: gcd(a,b) };
            }
        }
        return { text: "1+1", ans: 2 };
    }
    
    // ---------- APP STATE ----------
    let currentPage = "home";
    let activeCategory = "Addition";
    let activeSubMode = null;
    let activeComboOps = null;
    let quizActive = false;
    let session = { startTime: null, total: 0, correct: 0, times: [], questionStart: null, paused: false };
    let currentQ = null, currentAns = null, currentIsSubtraction = false;
    let settings = { limit: "100", inputMode: "Typing" };
    let history = [];
    let streak = { lastDate: null, count: 0 };
    let weakMap = {};
    let last5Cache = [];
    let stressTimer = null;
    let timerInterval = null;
    
    function loadData() {
        let saved = localStorage.getItem("mathUltraFinalSubtractionFix");
        if (saved) {
            let d = JSON.parse(saved);
            statsData = d.statsData || statsData;
            history = d.history || [];
            streak = d.streak || { lastDate: null, count: 0 };
            weakMap = d.weakMap || {};
            settings = d.settings || settings;
        }
        updateStreak();
    }
    function saveData() {
        localStorage.setItem("mathUltraFinalSubtractionFix", JSON.stringify({ statsData, history, streak, weakMap, settings }));
    }
    function updateStreak() {
        let today = new Date().toDateString();
        if (streak.lastDate === today) return;
        let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
        streak.lastDate === yesterday.toDateString() ? streak.count++ : streak.count = 1;
        streak.lastDate = today;
        saveData();
    }
    function recordWeak(cat, mode, wrong) {
        let key = `${cat}::${mode}`;
        if (!weakMap[key]) weakMap[key] = { wrong: 0, total: 0 };
        weakMap[key].total++;
        if (wrong) weakMap[key].wrong++;
        saveData();
    }
    
    function startQuestionTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (quizActive && !session.paused && session.questionStart) {
                let elapsed = Math.floor((Date.now() - session.questionStart) / 1000);
                let timerElem = document.getElementById("liveTimer");
                if (timerElem) timerElem.innerText = `Time: ${elapsed}s`;
            }
        }, 200);
    }
    
    function nextQuestion() {
        if (!quizActive || session.paused) return;
        let limitNum = settings.limit === "Unlimited" ? Infinity : parseInt(settings.limit);
        if (session.total >= limitNum) { endSession(); return; }
        let q;
        if (activeCategory === "Combos" && activeComboOps) {
            q = generateMixedQuestion(activeSubMode, activeComboOps);
            currentIsSubtraction = false; // mixed may contain subtraction, but we don't apply special rule to keep simple
        } else if (activeCategory === "Pro Modules") {
            q = generateProQuestion(activeSubMode);
            currentIsSubtraction = q.isSubtraction || false;
        } else if (["Square","Cube","Square Root","Cube Root","Tables","Others"].includes(activeCategory)) {
            q = generateOther(activeCategory, activeSubMode);
            currentIsSubtraction = false;
        } else {
            if (activeSubMode.startsWith("digit_")) {
                q = generateDigitCombo(activeCategory, activeSubMode);
            } else if (activeSubMode.includes("mix")) {
                q = generateMultiSetMix(activeCategory, activeSubMode);
            } else {
                q = generateMultiSetFixed(activeCategory, activeSubMode);
            }
            currentIsSubtraction = q.isSubtraction || false;
        }
        if (last5Cache.includes(q.text)) return nextQuestion();
        last5Cache.push(q.text);
        if (last5Cache.length > 5) last5Cache.shift();
        currentQ = q.text;
        currentAns = q.ans;
        session.questionStart = Date.now();
        renderQuiz();
    }
    
    function handleAnswer(val) {
        if (!quizActive || session.paused) return;
        let num = parseFloat(val);
        let correct = false;
        if (!isNaN(num)) {
            if (currentIsSubtraction && currentAns < 0) {
                // Negative answer: accept either negative or positive (absolute)
                correct = (Math.abs(num - currentAns) < 1e-6) || (Math.abs(num + currentAns) < 1e-6);
            } else {
                correct = Math.abs(num - currentAns) < 1e-6;
            }
        }
        let timeSpent = (Date.now() - session.questionStart) / 1000;
        session.times.push(timeSpent);
        session.total++;
        if (correct) session.correct++;
        else recordWeak(activeCategory, activeSubMode, true);
        
        if (["Addition","Subtraction","Multiplication","Division"].includes(activeCategory) && activeSubMode) {
            updateStats(activeCategory, activeSubMode, correct);
        }
        if (activeCategory === "Pro Modules") {
            if (activeSubMode === "AI Smart Trainer") {
                aiDifficulty = correct ? Math.min(4, aiDifficulty+1) : Math.max(0, aiDifficulty-1);
            }
            if (activeSubMode === "Stress Buster") {
                stressLevel = correct ? Math.min(4, stressLevel+1) : Math.max(1, stressLevel-1);
                if (stressTimer) clearInterval(stressTimer);
                startStressTimer();
            }
        }
        let limitNum = settings.limit === "Unlimited" ? Infinity : parseInt(settings.limit);
        if (session.total >= limitNum) endSession();
        else nextQuestion();
    }
    
    function startStressTimer() {
        if (stressTimer) clearInterval(stressTimer);
        let sec = [10,7,5,3][stressLevel-1];
        stressTimer = setInterval(() => {
            if (quizActive && activeCategory === "Pro Modules" && activeSubMode === "Stress Buster" && !session.paused) {
                handleAnswer(null);
            }
        }, sec * 1000);
    }
    
    function endSession() {
        if (!quizActive) return;
        let totalSec = (Date.now() - session.startTime) / 1000;
        let acc = session.total ? (session.correct / session.total * 100) : 0;
        let avg = session.times.length ? (session.times.reduce((a,b)=>a+b,0) / session.times.length) : 0;
        let minT = session.times.length ? Math.min(...session.times) : 0;
        let maxT = session.times.length ? Math.max(...session.times) : 0;
        history.unshift({
            date: new Date().toLocaleString(),
            category: activeCategory,
            mode: activeSubMode,
            accuracy: acc.toFixed(1),
            totalTime: totalSec.toFixed(1),
            avgSpeed: avg.toFixed(2),
            minTime: minT.toFixed(2),
            maxTime: maxT.toFixed(2),
            qCount: session.total
        });
        if (history.length > 20) history.pop();
        saveData();
        if (stressTimer) clearInterval(stressTimer);
        if (timerInterval) clearInterval(timerInterval);
        quizActive = false;
        currentPage = "home";
        render();
    }
    
    // ---------- UI RENDER ----------
    function render() {
        let root = document.getElementById("root");
        root.innerHTML = `
            <div class="app-card">
                <div class="header">
                    <h1>Math Master Ultra Pro</h1>
                    <div class="streak-badge">🔥 Streak: ${streak.count}</div>
                    <button class="settings-icon" id="settingsBtn">⚙️</button>
                </div>
                <div class="content" id="mainContent"></div>
            </div>
            <div id="modal" class="modal">
                <div class="modal-card">
                    <h3>Settings</h3>
                    <label>Question Limit:</label>
                    <select id="limitSelect"><option>50</option><option>100</option><option>200</option><option>400</option><option>800</option><option>1600</option><option>Unlimited</option></select>
                    <label>Input Mode:</label>
                    <select id="modeSelect"><option>Typing</option><option>MCQ (soon)</option></select>
                    <button id="saveSettingsBtn">Save</button>
                    <button id="closeModalBtn">Close</button>
                    <hr>
                    <button id="viewHistoryBtn">📜 View History</button>
                </div>
            </div>
        `;
        document.getElementById("settingsBtn").onclick = () => document.getElementById("modal").style.display = "flex";
        document.getElementById("closeModalBtn").onclick = () => document.getElementById("modal").style.display = "none";
        document.getElementById("saveSettingsBtn").onclick = () => {
            settings.limit = document.getElementById("limitSelect").value;
            settings.inputMode = document.getElementById("modeSelect").value;
            saveData();
            document.getElementById("modal").style.display = "none";
            render();
        };
        document.getElementById("viewHistoryBtn").onclick = () => {
            let msg = history.map(h => `${h.date}\n${h.category} - ${h.accuracy}% (${h.qCount} Q, ${h.totalTime}s)`).join("\n\n");
            alert(msg || "No history yet");
            document.getElementById("modal").style.display = "none";
        };
        document.getElementById("limitSelect").value = settings.limit;
        document.getElementById("modeSelect").value = settings.inputMode;
        
        let content = document.getElementById("mainContent");
        if (currentPage === "home") {
            let categories = ["Addition","Subtraction","Multiplication","Division","Square","Cube","Square Root","Cube Root","Tables","Others","Combos","Pro Modules"];
            let comboModes = ["Add + Sub Combo","Add + Sub + Mul","ASMD All Combo"];
            let proModes = ["AI Smart Trainer","Stress Buster","Decimal & Fraction"];
            content.innerHTML = `
                <div class="grid-2col">
                    ${categories.map(c => `<div class="cat-card" data-cat="${c}">${c}</div>`).join('')}
                </div>
                <div class="section-title">⚡ Combo Modes</div>
                <div class="grid-3col">
                    ${comboModes.map(c => `<div class="cat-card" data-combo="${c}">${c}</div>`).join('')}
                </div>
                <div class="section-title">🔥 Pro Modules</div>
                <div class="grid-3col">
                    ${proModes.map(p => `<div class="cat-card" data-pro="${p}">${p}</div>`).join('')}
                </div>
                <div class="history-box">
                    <b>📜 Your Performance History</b><br>
                    ${history.length === 0 ? "No data available yet. Start solving!" : history.slice(0,5).map(h => `${h.date.split(',')[0]} | ${h.category} | ${h.accuracy}% | ${h.totalTime}s`).join('<br>')}
                </div>
            `;
            document.querySelectorAll("[data-cat]").forEach(el => {
                el.onclick = () => { activeCategory = el.getAttribute("data-cat"); activeComboOps = null; currentPage = "levels"; render(); };
            });
            document.querySelectorAll("[data-combo]").forEach(el => {
                el.onclick = () => {
                    let combo = el.getAttribute("data-combo");
                    activeCategory = "Combos";
                    if (combo === "Add + Sub Combo") activeComboOps = ['+', '-'];
                    else if (combo === "Add + Sub + Mul") activeComboOps = ['+', '-', '×'];
                    else if (combo === "ASMD All Combo") activeComboOps = ['+', '-', '×', '÷'];
                    currentPage = "levels";
                    render();
                };
            });
            document.querySelectorAll("[data-pro]").forEach(el => {
                el.onclick = () => { activeCategory = "Pro Modules"; activeSubMode = el.getAttribute("data-pro"); startQuiz(); };
            });
        }
        else if (currentPage === "levels") {
            if (activeCategory === "Addition" || activeCategory === "Subtraction" || activeCategory === "Multiplication" || activeCategory === "Division" || activeCategory === "Combos") {
                let html = `<button class="back-btn" id="backHome">← Back</button>
                    <div class="section-title">🔢 Digit Combo (1x1 → 7x7)</div>
                    <div class="grid-3col" id="digitGrid"></div>
                    <div class="section-title">🧩 Multi-Set (1-digit to 5-digit, fixed term counts)</div>
                    <div class="grid-3col" id="multiFixedGrid"></div>
                    <div class="section-title">🔄 Multi-Set Mix (1-digit to 5-digit, random 3-7 terms)</div>
                    <div class="grid-3col" id="multiMixGrid"></div>`;
                content.innerHTML = html;
                let digitDiv = document.getElementById("digitGrid");
                let fixedDiv = document.getElementById("multiFixedGrid");
                let mixDiv = document.getElementById("multiMixGrid");
                DIGIT_COMBOS.forEach(d => {
                    let key = `digit_${d}`;
                    let stats = statsData[activeCategory]?.[key];
                    let statsText = (stats && stats.total>0) ? ` (${stats.correct}✅, ${stats.total-stats.correct}❌)` : "";
                    let btn = document.createElement("div");
                    btn.className = "level-btn";
                    btn.innerText = `${d}${statsText}`;
                    btn.onclick = () => { activeSubMode = key; startQuiz(); };
                    digitDiv.appendChild(btn);
                });
                for (let d of MULTI_DIGITS) {
                    for (let t of MULTI_TERMS) {
                        let key = `multiset_${d}digit_${t}term`;
                        let stats = statsData[activeCategory]?.[key];
                        let statsText = (stats && stats.total>0) ? ` (${stats.correct}✅, ${stats.total-stats.correct}❌)` : "";
                        let btn = document.createElement("div");
                        btn.className = "level-btn";
                        btn.innerText = `${d}-digit ${t}-term${statsText}`;
                        btn.onclick = () => { activeSubMode = key; startQuiz(); };
                        fixedDiv.appendChild(btn);
                    }
                }
                for (let d of MULTI_DIGITS) {
                    let key = `multiset_${d}digit_mix`;
                    let stats = statsData[activeCategory]?.[key];
                    let statsText = (stats && stats.total>0) ? ` (${stats.correct}✅, ${stats.total-stats.correct}❌)` : "";
                    let btn = document.createElement("div");
                    btn.className = "level-btn";
                    btn.innerText = `${d}-digit (3-7 terms mix)${statsText}`;
                    btn.onclick = () => { activeSubMode = key; startQuiz(); };
                    mixDiv.appendChild(btn);
                }
                document.getElementById("backHome").onclick = () => { currentPage = "home"; render(); };
            } else {
                let opts = [];
                if (activeCategory === "Square") opts = ["1-digit","2-digit","3-digit","4-digit","Advanced Mix"];
                else if (activeCategory === "Cube") opts = ["1-digit","2-digit","3-digit","4-digit","Advanced Mix"];
                else if (activeCategory === "Square Root") opts = ["Beginner","Intermediate","Advanced"];
                else if (activeCategory === "Cube Root") opts = ["Beginner","Intermediate","Advanced"];
                else if (activeCategory === "Tables") opts = ["Small Blocks","Combined","Master"];
                else if (activeCategory === "Others") opts = ["Percentage","LCM","HCF"];
                else opts = ["Standard"];
                content.innerHTML = `<button class="back-btn" id="backHome">← Back</button><div class="grid-2col">${opts.map(o => `<div class="level-btn" data-opt="${o}">${o}</div>`).join('')}</div>`;
                document.querySelectorAll("[data-opt]").forEach(btn => {
                    btn.onclick = () => { activeSubMode = btn.getAttribute("data-opt"); startQuiz(); };
                });
                document.getElementById("backHome").onclick = () => { currentPage = "home"; render(); };
            }
        }
        else if (currentPage === "quiz") renderQuiz();
    }
    
    function startQuiz() {
        quizActive = true;
        session = { startTime: Date.now(), total: 0, correct: 0, times: [], questionStart: null, paused: false };
        aiDifficulty = 2;
        stressLevel = 1;
        if (stressTimer) clearInterval(stressTimer);
        if (activeCategory === "Pro Modules" && activeSubMode === "Stress Buster") startStressTimer();
        last5Cache = [];
        currentPage = "quiz";
        startQuestionTimer();
        nextQuestion();
    }
    
    function renderQuiz() {
        let content = document.getElementById("mainContent");
        if (!content) return;
        let totalQ = settings.limit === "Unlimited" ? "∞" : settings.limit;
        let acc = session.total ? ((session.correct / session.total) * 100).toFixed(1) : "0";
        let extra = "";
        if (activeCategory === "Pro Modules" && activeSubMode === "Stress Buster") {
            let sec = [10,7,5,3][stressLevel-1];
            extra = `<span style="background:#fed7aa;padding:4px 12px;border-radius:30px;">⏱️ ${sec}s (L${stressLevel})</span>`;
        }
        if (activeCategory === "Pro Modules" && activeSubMode === "AI Smart Trainer") {
            extra = `<span>🧠 AI Level: ${aiDifficulty+1}/5</span>`;
        }
        content.innerHTML = `
            <div class="quiz-panel">
                <div class="quiz-header">
                    <span>Q: ${session.total}/${totalQ}</span>
                    <span id="liveTimer">Time: 0s</span>
                    <span>Streak: ${streak.count} 🎉</span>
                    ${extra}
                </div>
                <div class="question">${currentQ}</div>
                <input type="number" id="quizInput" class="answer-input" placeholder="आपका उत्तर (ऋणात्मक उत्तर के लिए +ve लिखें)" step="any" autocomplete="off" autofocus>
                <div class="quiz-actions">
                    <button class="pause-btn" id="pauseBtn">⏸️ Pause</button>
                    <button class="end-btn" id="endBtn">🏁 End</button>
                    <button class="menu-btn" id="menuBtn">← Menu</button>
                </div>
            </div>
        `;
        let input = document.getElementById("quizInput");
        let paused = false;
        document.getElementById("pauseBtn").onclick = () => {
            if (!paused) {
                session.paused = true;
                paused = true;
                document.getElementById("pauseBtn").innerHTML = "▶️ Resume";
                if (stressTimer) clearInterval(stressTimer);
                if (timerInterval) clearInterval(timerInterval);
            } else {
                session.paused = false;
                session.questionStart = Date.now();
                paused = false;
                document.getElementById("pauseBtn").innerHTML = "⏸️ Pause";
                startQuestionTimer();
                if (activeCategory === "Pro Modules" && activeSubMode === "Stress Buster") startStressTimer();
                nextQuestion();
            }
        };
        input.oninput = () => {
            if (session.paused) return;
            let val = input.value;
            let num = parseFloat(val);
            let correct = false;
            if (!isNaN(num)) {
                if (currentIsSubtraction && currentAns < 0) {
                    correct = (Math.abs(num - currentAns) < 1e-6) || (Math.abs(num + currentAns) < 1e-6);
                } else {
                    correct = Math.abs(num - currentAns) < 1e-6;
                }
            }
            if (correct) {
                handleAnswer(val);
                input.value = "";
                input.classList.remove("wrong");
            } else if (val !== "") {
                input.classList.add("wrong");
            } else {
                input.classList.remove("wrong");
            }
        };
        document.getElementById("endBtn").onclick = () => endSession();
        document.getElementById("menuBtn").onclick = () => endSession();
        session.questionStart = Date.now();
        input.focus();
    }
    
    loadData();
    render();
</script>
</body>
</html>
